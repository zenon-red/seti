name: release-binaries

on:
  workflow_dispatch:
  push:
    tags:
      - 'v*'
      - '@zenon-red/seti@*'

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: bun-linux-x64
            output: seti-linux-x64
          - target: bun-linux-arm64
            output: seti-linux-arm64
          - target: bun-darwin-x64
            output: seti-darwin-x64
          - target: bun-darwin-arm64
            output: seti-darwin-arm64
          - target: bun-windows-x64
            output: seti-windows-x64.exe
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: '1.3.9'

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build binary
        run: |
          mkdir -p artifacts
          bun build ./src/index.ts --compile --target=${{ matrix.target }} --outfile=./artifacts/${{ matrix.output }}

      - name: Upload binary artifact
        uses: actions/upload-artifact@v6
        with:
          name: ${{ matrix.output }}
          path: artifacts/${{ matrix.output }}

  release:
    if: startsWith(github.ref, 'refs/tags/')
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-assets
          merge-multiple: true

      - name: Generate checksums
        run: |
          cd release-assets
          sha256sum * > SHA256SUMS.txt

      - name: Publish release assets
        uses: softprops/action-gh-release@v2.5.0
        with:
          files: release-assets/*
          generate_release_notes: true
